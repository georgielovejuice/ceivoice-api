services:
  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: ceivoice-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ceivoice-network

volumes:
  rabbitmq_data:
    driver: local

networks:
  ceivoice-network:
    driver: bridge
