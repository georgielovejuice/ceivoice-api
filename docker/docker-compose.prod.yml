# Ollama runs on its own separate LXC — set OLLAMA_HOST in .env.production
# to that LXC's IP, e.g.: OLLAMA_HOST=http://192.168.1.x:11434

services:
  # ─── CeiVoice API Backend ────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: ceivoice-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      # OLLAMA_HOST is read from .env.production (points to Ollama LXC)
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ceivoice-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes: {}

networks:
  ceivoice-network:
    driver: bridge
