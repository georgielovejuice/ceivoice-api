services:
  # ─── Ollama AI (local LLM) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ceivoice-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ceivoice-network

  # ─── CeiVoice API Backend ────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: ceivoice-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ceivoice-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data:
    driver: local

networks:
  ceivoice-network:
    driver: bridge
