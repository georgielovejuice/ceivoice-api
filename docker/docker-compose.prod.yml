services:
  # ─── CeiVoice API Backend ────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: ceivoice-api
    restart: unless-stopped
    # We keep ports for internal troubleshooting, but Cloudflare uses the network
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # Database
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      # Auth & Security
      CORS_ORIGIN: ${CORS_ORIGIN}
      AUTH_MODE: ${AUTH_MODE}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_OAUTH_CALLBACK_URL: ${SUPABASE_OAUTH_CALLBACK_URL}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      DISABLE_EMAIL: ${DISABLE_EMAIL}
      FROM_EMAIL: ${FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      # AI
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ceivoice-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ceivoice-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      # Injected via Portainer environment variables for security
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - api
    networks:
      - ceivoice-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  ceivoice-network:
    driver: bridge